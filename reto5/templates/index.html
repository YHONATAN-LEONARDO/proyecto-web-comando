<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comando - Gestor de Documentos</title>
    <style>
        body { margin: 0; background-color: #030a05; color: #33ff33; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .national-strip { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(to right, #D52B1E 33%, #F9E11E 33%, #F9E11E 66%, #007934 66%); }
        .terminal { background: #051007; border: 1px solid #115511; box-shadow: 0 0 15px rgba(51, 255, 51, 0.1); padding: 30px; width: 600px; }
        h1 { font-size: 1.3em; border-bottom: 1px dashed #33ff33; padding-bottom: 10px; margin-top: 0; }
        .file-viewer { background: #000; border: 1px solid #33ff33; padding: 15px; min-height: 150px; margin-top: 20px; white-space: pre-wrap; word-wrap: break-word; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .controls a { color: #000; background: #33ff33; text-decoration: none; padding: 8px 15px; font-weight: bold; font-size: 0.9em; }
        .controls a:hover { background: #fff; }
        .current-doc { font-size: 0.85em; color: #88ff88; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="national-strip"></div>
    <div class="terminal">
        <h1>SISTEMA DE ARCHIVOS CLASIFICADOS</h1>
        <p>Nivel de Autorización: VISOR ESTÁNDAR</p>
        
        <div class="controls">
            <a href="?doc=reporte_01.txt">[CARGAR REPORTE 01]</a>
            <a href="?doc=inventario.txt">[CARGAR INVENTARIO]</a>
        </div>

        <div class="file-viewer">
            <div class="current-doc">Leyendo documento: {{ doc_name }}</div>
            <hr style="border-color: #115511;">
            {{ contenido }}
        </div>
    </div>
</body>
</html>
